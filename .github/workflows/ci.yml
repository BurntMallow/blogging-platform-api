name: Java CI with Docker Compose

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  DB_NAME: blogging_db
  DB_USER: postgres
  DB_PASSWORD: password

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Grant execute permission for mvnw
      run: chmod +x mvnw

    # PHASE 1: Run your standard local H2 slice tests on the host runner for fast verification
    - name: Build and Run Tests
      run: ./mvnw clean verify

    # PHASE 2: Verify the exact Docker infrastructure works using your Multi-Stage setup
    - name: Verify Docker Compose Build Lifecycle
      run: |
        # 1. Spin up the multi-stage compose environment.
        # Docker handles the compilation internally; no manual JAR preparation needed!
        docker compose up --build -d
        
        # 2. Wait up to 30 seconds for the app's internal health check to pass
        echo "Waiting for blog-app container to pass health checks..."
        for i in {1..6}; do
          if [ "$(docker inspect --format='{{.State.Health.Status}}' blog-app)" = "healthy" ]; then
            echo "✅ Containerized application is healthy!"
            break
          fi
          echo "Still waiting..."
          sleep 5
        done
        
        # 3. Print container states to logs for debugging visibility
        docker compose ps

    - name: Post-Build Cleanup
      if: always()
      run: |
        docker compose down -v